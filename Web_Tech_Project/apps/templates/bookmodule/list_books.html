{% extends 'bookmodule/layouts/base.html' %}
{% load static %}

{% block content %}
<div class="books-page-container">
    <h1 class="page-title">مكتبة غصن</h1>

    <div class="books-grid">
        {% if books %}
            {% for book in books %}
                <div class="book-card-modern">
                    <div class="book-cover">
                        <img src="{% static 'book' %}{{ book.id }}.png" alt="{{ book.title }}">
                    </div>
                    <h3>{{ book.title }}</h3>
                    <p class="author-text">{{ book.author }}</p>
                    <span class="category-tag">{{ book.category }}</span>
                    <button class="read-btn-modern">اقرأ الآن</button>
                </div>
            {% endfor %}
        {% else %}
            <div style="text-align: center; width: 100%; margin-top: 60px;">
                <p style="font-size: 1.5rem; color: var(--ghusn-brown);">عذراً نورة، لم نجد نتائج تطابق بحثك.</p>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
