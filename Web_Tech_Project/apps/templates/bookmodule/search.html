{% extends 'bookmodule/layouts/base.html' %}
{% load static %}

{% block title %} البحث عن الكتب {% endblock %}

{% block content %}
<div class="container" style="padding: 40px; text-align: center;">
    <h2 class="page-title">ابحث عن كتابك في غصن</h2>

    <form method="POST" action="{% url 'books.search' %}" class="searchForm" style="margin-top: 30px;">
        {% csrf_token %}

        <input type="text" name="keyword" placeholder="اكتب عنوان الكتاب أو المؤلف..." required
               style="padding: 12px; width: 350px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Amiri', serif;">

        <br><br>

        <div style="font-size: 1.1rem; color: #5d4037;">
            <label><input type="checkbox" name="option1" checked> البحث في العنوان</label>
            <label style="margin-right: 30px;"><input type="checkbox" name="option2"> البحث في المؤلف</label>
        </div>

        <br><br>

        <button type="submit" style="background-color: #2e7d32; color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; font-family: 'Amiri', serif; font-size: 1.1rem; font-weight: bold;">
            بحث في غصن
        </button>
    </form>
</div>
{% endblock %}
